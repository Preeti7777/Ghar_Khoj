
{% block content %}
<style>
    .otp-page {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
        background: #f8f9fa;
    }

    .otp-card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 30px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    .otp-icon {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: #E1F5EE;
        color: #0F6E56;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        margin-bottom: 18px;
    }

    .otp-card h3 {
        font-size: 25px;
        font-weight: 800;
        color: #1f2937;
        margin-bottom: 7px;
    }

    .otp-card p {
        font-size: 14px;
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .otp-group {
        margin-bottom: 18px;
    }

    .otp-group label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: #374151;
        margin-bottom: 8px;
    }

    .otp-input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 11px;
        padding: 13px 14px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 8px;
        text-align: center;
        outline: none;
        color: #1f2937;
    }

    .otp-input:focus {
        border-color: #0F6E56;
        box-shadow: 0 0 0 3px rgba(15, 110, 86, 0.13);
    }

    .otp-btn {
        width: 100%;
        border: none;
        border-radius: 11px;
        padding: 13px;
        background: #0F6E56;
        color: #ffffff;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
    }

    .otp-btn:hover {
        background: #085041;
        transform: translateY(-1px);
    }

    .otp-note {
        margin-top: 16px;
        font-size: 13px;
        color: #6b7280;
        text-align: center;
    }

    /* flash message */
        .flash {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .flash-success {
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid #b2d8c8;
    }

    .flash-error {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid #f5c6c6;
    }

    .flash-info {
      background: #e8f4fd;
      color: #185fa5;
      border: 1px solid #b5d4f4;
    }

    .alert-success {
      background:#f0fdf4;
      border-color:#86efac;
      color:#166534;
    }

    .alert-success .msg-timer {
      background:#16a34a;
      opacity:.4;
    }

    .alert-error,
    .alert-danger {
      background:#fef2f2;
      border-color:#fca5a5;
      color:#991b1b;
    }

    .alert-error .msg-timer,
    .alert-danger .msg-timer {
      background:#dc2626;
      opacity:.4;
    }

    .alert-warning {
      background:#fffbeb;
      border-color:#fcd34d;
      color:#92400e;
    }

    .alert-warning .msg-timer {
      background:#d97706;
      opacity:.4;
    }

    .alert-info {
      background:#eff6ff;
      border-color:#93c5fd;
      color:#1e40af;
    }

    .alert-info .msg-timer {
      background:#2563eb;
      opacity:.4;
    }

    @keyframes msgShrink {
      from { width:100%; }
      to { width:0%; }
    }
</style>
    {% if messages %}
      <div id="messages-container" style="position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; min-width:320px; max-width:420px;">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}" style="display:flex; align-items:flex-start; gap:12px; padding:13px 16px; border-radius:12px; border:0.5px solid; font-size:14px; line-height:1.5; position:relative; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.08);">
            <div style="flex:1;">{{ message }}</div>

            <button onclick="this.closest('.alert').remove()" style="background:none; border:none; cursor:pointer; font-size:18px; opacity:.5; padding:0; line-height:1;">
              &times;
            </button>

            <div class="msg-timer" style="position:absolute; bottom:0; left:0; height:3px; width:100%; animation:msgShrink 5s linear forwards;"></div>
          </div>
        {% endfor %}
      </div>
    {% endif %}
<div class="otp-page">
    <div class="otp-card">
        <div class="otp-icon">
            <i class="ti ti-mail-check"></i>
        </div>

        <h3>Verify Email</h3>
        <p>Enter the 6-digit OTP sent to your email address. The code will expire in 5 minutes.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="otp-group">
                <label for="otp">OTP Code</label>
                <input
                    type="text"
                    id="otp"
                    name="otp"
                    class="otp-input"
                    maxlength="6"
                    minlength="6"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    required
                    placeholder="000000"
                    autocomplete="one-time-code"
                >
            </div>

            <button type="submit" class="otp-btn">
                Verify Email
            </button>
        </form>

        <div class="otp-note">
            Please check your inbox or spam folder.
        </div>
    </div>
</div>
<script>
    setTimeout(function () {
      const container = document.getElementById("messages-container");

      if (container) {
        container.style.transition = "opacity 0.5s ease";
        container.style.opacity = "0";

        setTimeout(function () {
          container.remove();
        }, 500);
      }
    }, 5000);
</script>
{% endblock %}
